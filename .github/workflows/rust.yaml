name: Rust CI

on:
  push:
    branches: [ master ]
    tags:
      - v*
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: [ build ]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: 'publish'
    environment: cargo
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read crate metadata
        id: crate
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          echo "name=$(jq -r '.packages[0].name' <<< "$metadata")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.packages[0].version' <<< "$metadata")" >> "$GITHUB_OUTPUT"

      - name: Check crates.io version
        id: crates_io
        run: |
          status="$(
            curl --silent --show-error --output /dev/null --write-out "%{http_code}" \
              "https://crates.io/api/v1/crates/${{ steps.crate.outputs.name }}/${{ steps.crate.outputs.version }}"
          )"

          case "$status" in
            200)
              echo "published=true" >> "$GITHUB_OUTPUT"
              echo "${{ steps.crate.outputs.name }} ${{ steps.crate.outputs.version }} is already published"
              ;;
            404)
              echo "published=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected crates.io response: $status" >&2
              exit 1
              ;;
          esac

      - name: Publish to crates.io
        if: steps.crates_io.outputs.published != 'true'
        run: cargo publish --locked --registry crates-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
